# XPredict — PRODUCTION demo stack (single always-on host, e.g. a Hetzner CAX21 ARM VM).
#
# Goal: a reliable LIVE sales-meeting demo of the WHOLE platform with ZERO cold
# starts. Everything runs 24/7 on ONE host — Postgres + Redis are self-hosted
# (no Neon/Upstash, so no scale-to-zero and no Upstash/Celery command meter),
# the FastAPI backend + WebSocket feed and the Celery worker + beat are always-on
# processes, and the Next.js frontend runs a real `next start` build (not `pnpm
# dev`). A Caddy reverse-proxy terminates TLS so the browser reaches the app over
# https:// and the live price WebSocket over wss:// — both required for the WS
# Origin check + a credible demo URL.
#
# Differences vs the dev `docker-compose.yml` (which is dev-only, D-06):
#   * No `--reload` (backend) and no `pnpm dev` (frontend) — production commands.
#   * No bind-mounts of host source — images are self-contained (rebuild on deploy).
#   * No mailpit/flower by default (not needed for a seeded demo; see runbook to add).
#   * Postgres/Redis ports are NOT published to the host — internal network only.
#   * `restart: unless-stopped` everywhere so the stack survives a VM reboot.
#   * Caddy is the only service with host ports (80/443).
#
# Usage (from a CLEAN checkout on the VM, never a worktree):
#   cp .env.prod.example .env.prod   # then fill it in (see the file's header)
#   docker compose --env-file .env.prod -f docker-compose.prod.yml build
#   ./deploy/prod-init.sh            # alembic upgrade + create admin + seed demo
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# Full step-by-step: docs/runbooks/deploy-hetzner-demo.md

# YAML anchors so backend/worker/beat share env verbatim (prod values).
x-backend-env: &backend-env
  ENVIRONMENT: prod
  LOG_LEVEL: INFO
  DATABASE_URL: postgresql+asyncpg://xpredict:${POSTGRES_PASSWORD}@db:5432/xpredict
  DATABASE_URL_SYNC: postgresql+psycopg2://xpredict:${POSTGRES_PASSWORD}@db:5432/xpredict
  REDIS_URL: redis://redis:6379/0
  # FRONTEND_BASE_URL must EXACTLY equal the public frontend origin (scheme+host,
  # no trailing slash): it gates BOTH CORS and the WebSocket Origin allow-list
  # (backend/app/realtime/router.py::_origin_allowed). A mismatch (slash / www /
  # http) → the live price feed stays dark. `:?` aborts compose if it's unset.
  SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env.prod (>=32 chars)}
  # ADMIN_JWT_PUBLIC_SECRET is currently UNUSED by the frontend (the Next.js edge
  # gate in proxy.ts checks the admin_jwt cookie's PRESENCE only; the authoritative
  # admin gate is the backend's current_active_admin, keyed on SECRET_KEY). Kept as
  # a harmless forward-compat default — NOT load-bearing.
  ADMIN_JWT_PUBLIC_SECRET: ${ADMIN_JWT_PUBLIC_SECRET:-}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?set FRONTEND_BASE_URL to https://APP_DOMAIN (no trailing slash)}
  # First-admin bootstrap (read by bin/create_admin.py).
  FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:?set FIRST_ADMIN_EMAIL in .env.prod}
  FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:?set FIRST_ADMIN_PASSWORD in .env.prod}
  # Optional observability + email (leave blank to disable).
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM_ADDRESS: ${RESEND_FROM_ADDRESS:-}
  # Phase 5 sign-up bonus (house->wallet credit granted on email verification).
  # Overridable per-deploy via .env.prod; falls back to the app's config.py default.
  SIGNUP_BONUS_AMOUNT: ${SIGNUP_BONUS_AMOUNT:-1000.0000}

services:
  # ----------------------------------------------------------------------
  # Stateful infrastructure (self-hosted → zero cold start, no external meter)
  # ----------------------------------------------------------------------

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xpredict
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: xpredict
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
    # No host port — only reachable on the compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpredict -d xpredict"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly = durable across restarts; noeviction is REQUIRED for Celery +
    # redbeat — if Redis evicts the broker queue or the redbeat schedule/lock
    # keys under memory pressure, Celery raises InconsistencyError and the live
    # sync silently dies. noeviction makes it fail loud instead.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------
  # Backend application surfaces (api+WS, worker, beat) — all always-on
  # ----------------------------------------------------------------------

  backend:
    build: ./backend
    restart: unless-stopped
    # Production command: NO --reload. Single uvicorn process keeps the in-process
    # WebSocket connection registry coherent (the live price feed).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
    # No host port — Caddy reaches it as `backend:8000` over the compose network.
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info -Q default
    environment:
      <<: *backend-env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  beat:
    build: ./backend
    restart: unless-stopped
    # EXACTLY ONE beat process — never scale this service to >1, or every periodic
    # Gamma sync / settlement fires twice. The repo runs beat as its own service
    # (separate from the worker) precisely so there is a single scheduler.
    command: celery -A app.celery_app beat -l info
    environment:
      <<: *backend-env
    volumes:
      - beat_heartbeat:/tmp
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "[ $$(find /tmp/celerybeat.heartbeat -mmin -2 2>/dev/null | wc -l) -eq 1 ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------------------
  # Frontend (Next.js 16 production build — `next start`, always warm)
  # ----------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # NEXT_PUBLIC_* are inlined into the BROWSER bundle at BUILD time, so they
      # must be passed as build args (not just runtime env). They must be the
      # PUBLIC https/wss URLs the browser can reach — the api subdomain. `:?` makes
      # a blank value ABORT the build instead of silently baking the ws://localhost
      # fallback (which HTTPS blocks as mixed content → the live feed goes dark).
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL in .env.prod (e.g. https://api.your-domain.com)}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?set NEXT_PUBLIC_WS_URL in .env.prod (e.g. wss://api.your-domain.com)}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_LIVEBETS_WIDGET_SRC: ${NEXT_PUBLIC_LIVEBETS_WIDGET_SRC:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-only (SSR / Server Actions reach the backend over the compose
      # network — never bundled into the client).
      BACKEND_URL: http://backend:8000
      # Currently UNUSED by the frontend (the edge gate in proxy.ts checks the
      # admin_jwt cookie's PRESENCE only — no JWT verification). Kept for dev/prod
      # parity + forward-compat; harmless if blank.
      ADMIN_JWT_PUBLIC_SECRET: ${ADMIN_JWT_PUBLIC_SECRET:-}
    depends_on:
      backend: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Edge — Caddy reverse-proxy + automatic TLS (Let's Encrypt)
  # ----------------------------------------------------------------------

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Consumed by deploy/Caddyfile via {$VAR} placeholders. `:?` aborts if unset
      # (a blank site address makes Caddy fail to start / skip TLS).
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env.prod (e.g. app.your-domain.com)}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env.prod (e.g. api.your-domain.com)}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env.prod (a real inbox)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend: { condition: service_started }
      backend: { condition: service_started }

volumes:
  pg_data:
  redis_data:
  beat_heartbeat:
  caddy_data:
  caddy_config:
