# XPredict Alembic config (D-15, D-16).
#
# The `sqlalchemy.url` field is intentionally empty here — `env.py` reads
# `DATABASE_URL_SYNC` from `Settings` and sets it at runtime so we never
# have a DB URL in a committed file. Alembic uses psycopg2-binary (sync);
# the app uses asyncpg (async). See D-16.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Use Python's `logging` config below; nothing fancy in Phase 1.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
