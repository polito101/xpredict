# XPredict Phase 1 docker-compose stack (D-02 .. D-05).
#
# 8 services: db, redis, mailpit, backend, worker, beat, flower, frontend.
# Every service has a healthcheck per D-03; dependent services wait via
# `depends_on: { condition: service_healthy }` per D-04. Stateful volumes
# (pg_data, redis_data, mailpit_data, beat_heartbeat) per D-05.
#
# Backend image is shared by worker, beat, flower (D-02); each overrides CMD.
# Frontend builds its own Next.js 15 image.
#
# Dev-only (D-06). Staging/prod deploys via Railway/Fly.io using the same
# Dockerfiles, not this compose file.

# YAML anchors so backend/worker/beat/flower share env + volumes verbatim.
x-backend-env: &backend-env
  ENVIRONMENT: dev
  LOG_LEVEL: INFO
  DATABASE_URL: postgresql+asyncpg://xpredict:xpredict@db:5432/xpredict
  DATABASE_URL_SYNC: postgresql+psycopg2://xpredict:xpredict@db:5432/xpredict
  REDIS_URL: redis://redis:6379/0
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  SECRET_KEY: ${SECRET_KEY}
  ADMIN_JWT_PUBLIC_SECRET: ${ADMIN_JWT_PUBLIC_SECRET}
  # DEMO_MODE relaxes auth for the sales demo (6-char passwords, auto-verified
  # email, instant signup wallet bonus). Default ON for this dev/demo stack;
  # set DEMO_MODE=false in the env for production-grade auth.
  DEMO_MODE: ${DEMO_MODE:-true}

x-backend-volumes: &backend-volumes
  - ./backend:/app
  # Anonymous volume preserves container's Linux .venv from being clobbered
  # by host's Windows .venv (Scripts/ vs bin/ layout mismatch breaks $PATH).
  - /app/.venv

services:
  # ----------------------------------------------------------------------
  # Stateful infrastructure
  # ----------------------------------------------------------------------

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xpredict
      POSTGRES_PASSWORD: xpredict
      POSTGRES_DB: xpredict
      # PGDATA in a subdir avoids permission breakage when the volume is
      # mounted at /var/lib/postgresql/data (Pitfall 9).
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpredict -d xpredict"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------
  # Backend application surfaces (api, worker, beat, flower)
  # ----------------------------------------------------------------------

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
      # Live-bets demo (LB-C): the backend (a container) reaches the demo live-bets
      # instance on the HOST — container `localhost` != host, so use
      # host.docker.internal. Key/table come from .env.local (gitignored).
      LIVEBETS_API_BASE: http://host.docker.internal:8002
      LIVEBETS_API_KEY: ${LIVEBETS_API_KEY:-}
      LIVEBETS_DEFAULT_TABLE_ID: ${LIVEBETS_DEFAULT_TABLE_ID:-}
    volumes: *backend-volumes
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build: ./backend
    command: celery -A app.celery_app worker -l info -Q default
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # `$$HOSTNAME` is shell-expanded inside the container (the leading
      # double-$$ escapes compose interpolation).
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  beat:
    build: ./backend
    command: celery -A app.celery_app beat -l info
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      # Anonymous volume preserves container's Linux .venv (see x-backend-volumes).
      - /app/.venv
      # Shared named volume so the heartbeat file written by beat is
      # readable by the healthcheck `find` command (Pattern 1).
      - beat_heartbeat:/tmp
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # File mtime within the last 2 minutes => heartbeat thread alive.
      # Interval is 30 s; -mmin -2 gives a 90-second window and survives a
      # single missed beat without triggering a false health failure (WR-03).
      test: ["CMD-SHELL", "[ $$(find /tmp/celerybeat.heartbeat -mmin -2 2>/dev/null | wc -l) -eq 1 ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  flower:
    build: ./backend
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      <<: *backend-env
      # Flower 2.0+ requires explicit opt-in to expose the /api/* endpoints
      # without basic auth. Dev-only; staging/prod sets FLOWER_BASIC_AUTH.
      FLOWER_UNAUTHENTICATED_API: "true"
    volumes: *backend-volumes
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5555/api/workers"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------
  # Frontend (Next.js 15 dev server)
  # ----------------------------------------------------------------------

  frontend:
    build: ./frontend
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # NEXT_PUBLIC_* are inlined into the BROWSER bundle, so they MUST be
      # host-reachable — the browser cannot resolve the Docker-internal
      # `backend` hostname. Client-side paths use these: the WS base
      # (use-market-socket) + the client price-history re-fetch (Phase 9 /
      # MKT-04). Use `https://`/`wss://` behind TLS in prod.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      # DEMO_MODE counterpart for the browser bundle: switches the register form
      # to the frictionless email+password-only flow and relaxes the client-side
      # password rule. Must match the backend DEMO_MODE. Default ON for the demo.
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-true}
      # Live-bets demo (LB-C): the widget script is fetched by the BROWSER, so it
      # must be host-reachable (:8002 on the host, CORS-enabled for :3000).
      NEXT_PUBLIC_LIVEBETS_WIDGET_SRC: ${NEXT_PUBLIC_LIVEBETS_WIDGET_SRC:-http://localhost:8002/static/widget.js}
      # Server-only base for SSR / Server Components (lib/api.ts apiBase()),
      # which run INSIDE this container and reach the api over the compose
      # network. Never exposed to the browser.
      BACKEND_URL: http://backend:8000
      ADMIN_JWT_PUBLIC_SECRET: ${ADMIN_JWT_PUBLIC_SECRET}
    volumes:
      - ./frontend:/app
      # Anonymous volumes shadow node_modules and .next so the host's
      # (potentially Windows-native) versions don't override the
      # alpine-built node_modules inside the container.
      - /app/node_modules
      - /app/.next
    depends_on:
      backend: { condition: service_started }   # soft per D-04
    healthcheck:
      # node:20-alpine ships wget (BusyBox) but not curl. --spider = HEAD-like,
      # no body download. Same pattern as mailpit's healthcheck.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_data:
  redis_data:
  mailpit_data:
  beat_heartbeat:
